<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Banco de Talentos 22º BI</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer">
    <style>
        * { padding: 0; margin: 0; box-sizing: border-box; }
        body {
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            min-height: 100vh; padding: 1.5rem;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: #ffffff; color: gray;
        }

        .demo-note {
            position: fixed; top: 0; left: 0; right: 0;
            background: #fff3cd; color: #664d03; border-bottom: 1px solid #ffe69c;
            font-size: .8rem; text-align: center; padding: .5rem 1rem; z-index: 5;
        }

        .login-card {
            width: 100%; max-width: 470px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            padding: 2.5rem;
        }

        .login-logo { text-align: center; margin-bottom: 0.5rem; }
        .login-logo img { width: 230px; max-width: 65%; }

        .login-card h2 {
            font-size: 42px; font-weight: 500; color: #6b7280;
            text-align: left;
            margin: 0 0 1.5rem;
        }

        label { display: block; font-size: 16px; font-weight: 500; color: #4b5563; margin-bottom: .35rem; }
        .form-group { margin-bottom: 1.1rem; }
        .form-control { height: 48px; font-size: 14px; }
        .form-control:focus { border-color: #28a745; box-shadow: 0 0 0 .2rem rgba(40,167,69,.15); }

        .btn-entrar {
            width: 100%; background: #28a745; color: #fff;
            padding: .75rem; font-size: 17px; font-weight: 600;
            border: none; border-radius: 6px; cursor: pointer;
            transition: background-color .2s;
        }
        .btn-entrar:hover { background: #218838; }

        footer {
            width: 100%; text-align: center; padding: 1.2rem 0;
            font-size: 14px; color: #4b5563; margin-top: 1.5rem;
        }
        footer a { color: #0a66c2; text-decoration: none; font-weight: 500; }
        footer a:hover { text-decoration: underline; }

        @media (max-width: 480px) {
            .login-card { padding: 1.8rem; }
            .login-card h2 { font-size: 34px; }
            .login-logo img { max-width: 55%; }
        }
    </style>
</head>

<body>
    <div class="demo-note">
        <i class="fas fa-circle-info"></i> Versão de demonstração — credenciais fictícias já preenchidas. Clique em <b>Entrar</b>.
    </div>

    <form class="login-card" onsubmit="entrar(event)">
        <div class="login-logo"><img src="logo.png" alt="Banco de Talentos 22º BI"></div>
        <h2>Login</h2>

        <div class="form-group">
            <label for="usuario"><i class="fas fa-user"></i> Usuário:</label>
            <input type="text" id="usuario" class="form-control" placeholder="Ex: sgteccap" value="sgteccap" required>
        </div>
        <div class="form-group">
            <label for="senha"><i class="fas fa-lock"></i> Senha:</label>
            <input type="password" id="senha" class="form-control" placeholder="Ex: senha" value="demo1234" required>
        </div>

        <button type="submit" class="btn-entrar">Entrar</button>
    </form>

    <footer>
        &copy; 2026 Banco de Talentos SecInfor 22° BI — Desenvolvido por
        <a href="https://www.linkedin.com/in/samuel-teles-dos-santos-662003237/" target="_blank" rel="noopener">
            <i class="fa-brands fa-linkedin"></i> SD Teles</a>
    </footer>

    <script>
        function entrar(e) { e.preventDefault(); window.location.href = 'listar.html'; }
    </script>
</body>

</html>
